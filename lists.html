<!DOCTYPE html>
<html>

<head>
    <meta charset="uth-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Lists</title>
</head>

<body>
    <h2> An ordered HTML list:</h2>
    <ol>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
        <li>Fourth item</li>
    </ol>

    <h2> An unordered list:</h2>
    <ul>
        <li> Item</li>
        <li> item</li>
        <li> Item</li>
        <li> Item</li>
    </ul>

    <h2> Defination List:</h2>
    <dl>
        <dt>Tea</dt>
        <dd>- Hot drink</dd>

        <dt> Juice</dt>
        <dd> -Cold Drink</dd>
    </dl>
</body>

</html>
